<div class="min-h-screen bg-gray-100 flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8">
    <h2 class="text-center text-2xl font-bold tracking-wide text-gray-800">Inscription</h2>
  <p class="text-center text-sm text-gray-600 mt-2">
  Vous avez déjà un compte ?
  <a routerLink="/login" class="text-blue-600 hover:text-blue-700 hover:underline">Connectez-vous ici</a>
</p>

    <form (ngSubmit)="onInscription()" class="space-y-4" #inscriptionForm="ngForm">
      <!-- Nom -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nom</label>
        <input type="text" [(ngModel)]="user.nom" name="nom" required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" />
      </div>

      <!-- Prénom -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Prénom</label>
        <input type="text" [(ngModel)]="user.prenom" name="prenom" required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" />
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" [(ngModel)]="user.email" name="email" required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" />
      </div>

      <!-- Téléphone -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Téléphone</label>
        <input type="text" [(ngModel)]="user.phone" name="phone" required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" />
      </div>

      <!-- Mot de passe -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
        <input type="password" [(ngModel)]="user.password" name="password" required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" />
      </div>

      <!-- Role -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Je suis</label>
        <select [(ngModel)]="user.role" name="role" required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
          <option value="acheteur">Acheteur</option>
          <option value="producteur">Producteur</option>
        </select>
      </div>

      <!-- Buyer / Producer fields -->
      <div *ngIf="user.role === 'acheteur'">
        <input type="text" [(ngModel)]="user.buyer.organisation" name="buyerOrganisation" placeholder="Organisation (optionnel)"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 my-2" />
        <input type="text" [(ngModel)]="user.buyer.adresse" name="buyerAdresse" placeholder="Adresse (optionnel)"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 my-2" />
      </div>

      <div *ngIf="user.role === 'producteur'">
        <input type="text" [(ngModel)]="user.producer.organisation" name="prodOrganisation" placeholder="Organisation (optionnel)"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 my-2" />
        <input type="text" [(ngModel)]="user.producer.region" name="prodRegion" placeholder="Région (optionnel)"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 my-2" />
        <input type="text" [(ngModel)]="user.producer.parcelle_nom" name="prodParcelle" placeholder="Parcelle (optionnel)"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 my-2" />
      </div>

      <button type="submit" [disabled]="inscriptionForm.invalid"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg transition-colors">
        S'inscrire
      </button>

      <div *ngIf="errorMessage" class="mt-4 text-red-500 text-sm text-center">{{ errorMessage }}</div>
    </form>
  </div>
</div>
